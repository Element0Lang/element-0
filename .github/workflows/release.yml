name: Create Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
#  cancel-in-progress: true

jobs:
  call_tests:
    uses: ./.github/workflows/tests.yml

  build-and-release:
    name: Build and Release
    needs: call_tests
    if: success()
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact_name: elz-linux-x86_64.tar.gz
            can_test: true
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            artifact_name: elz-linux-aarch64.tar.gz
            can_test: false  # Cross-compiled, can't run on x86_64
          - os: macos-latest
            target: ""  # Empty = native build (uses system headers)
            artifact_name: elz-macos-aarch64.tar.gz
            can_test: true  # macos-latest is ARM64
          - os: windows-latest
            target: x86_64-windows-msvc
            artifact_name: elz-windows-x86_64.zip
            can_test: true
          - os: windows-latest
            target: aarch64-windows-msvc
            artifact_name: elz-windows-aarch64.zip
            can_test: false  # Cross-compiled, can't run on x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build the binary
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }}
          else
            zig build -Doptimize=ReleaseSmall
          fi
        shell: bash

      - name: Verify built binary exists (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f zig-out/bin/elz-repl ]; then
            echo "ERROR: built binary zig-out/bin/elz-repl not found"
            ls -l zig-out/bin || true
            exit 1
          fi

      - name: Verify built binary exists (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "zig-out\bin\elz-repl.exe")) {
            Write-Host 'ERROR: built binary zig-out\bin\elz-repl.exe not found'
            dir zig-out\bin
            exit 1
          }

      - name: Smoke test - run a simple example (Unix)
        if: runner.os != 'Windows' && matrix.can_test
        run: |
          echo "Running smoke test..."
          echo '(+ 1 2 3)' | ./zig-out/bin/elz-repl --eval '(+ 1 2 3)' || \
            ./zig-out/bin/elz-repl --file examples/elz/e13-hello-world.elz
          echo "Smoke test passed!"

      - name: Smoke test - run a simple example (Windows)
        if: runner.os == 'Windows' && matrix.can_test
        run: |
          Write-Host "Running smoke test..."
          .\zig-out\bin\elz-repl.exe --file examples\elz\e13-hello-world.elz
          Write-Host "Smoke test passed!"

      - name: Prepare release artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          # Extract release dir name from artifact name (e.g., elz-linux-x86_64.tar.gz -> elz-linux-x86_64)
          RELEASE_DIR="${{ matrix.artifact_name }}"
          RELEASE_DIR="${RELEASE_DIR%.tar.gz}"
          RELEASE_DIR="${RELEASE_DIR%.zip}"
          mkdir -p "$RELEASE_DIR/bin"
          mkdir -p "$RELEASE_DIR/stdlib"
          mkdir -p "$RELEASE_DIR/examples"

          # Copy binary
          cp zig-out/bin/elz-repl "$RELEASE_DIR/bin/"

          # Copy stdlib (required for REPL)
          cp -r stdlib/* "$RELEASE_DIR/stdlib/" 2>/dev/null || true

          # Copy examples
          cp -r examples/elz/* "$RELEASE_DIR/examples/" 2>/dev/null || true

          # Copy docs
          cp README.md "$RELEASE_DIR/" 2>/dev/null || true
          cp LICENSE "$RELEASE_DIR/" 2>/dev/null || true

          # Create tarball
          tar -czvf "${{ matrix.artifact_name }}" "$RELEASE_DIR"

      - name: Prepare release artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          # Extract release dir name from artifact name
          $RELEASE_DIR = "${{ matrix.artifact_name }}" -replace '\.zip$', '' -replace '\.tar\.gz$', ''
          New-Item -ItemType Directory -Path "$RELEASE_DIR\bin" -Force | Out-Null
          New-Item -ItemType Directory -Path "$RELEASE_DIR\stdlib" -Force | Out-Null
          New-Item -ItemType Directory -Path "$RELEASE_DIR\examples" -Force | Out-Null

          # Copy binary
          Copy-Item zig-out\bin\elz-repl.exe "$RELEASE_DIR\bin\"

          # Copy stdlib (required for REPL)
          if (Test-Path stdlib) {
            Copy-Item -Recurse stdlib\* "$RELEASE_DIR\stdlib\" -ErrorAction SilentlyContinue
          }

          # Copy examples
          if (Test-Path examples\elz) {
            Copy-Item -Recurse examples\elz\* "$RELEASE_DIR\examples\" -ErrorAction SilentlyContinue
          }

          # Copy docs
          if (Test-Path README.md) { Copy-Item README.md "$RELEASE_DIR\" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$RELEASE_DIR\" }

          # Create zip
          Compress-Archive -Path "$RELEASE_DIR\*" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  publish-release:
    name: Publish Release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=nightly-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
